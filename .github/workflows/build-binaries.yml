name: Prebuilt binaries

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Build for linux
      run: go build -ldflags='-w -s' -o flexoeshoje cmd/root.go

    - name: Build for windows
      run: GOOS=windows go build -ldflags='-w -s' -o flexoeshoje.exe cmd/root.go

    - name: Build for macos
      run: GOOS=darwin go build -ldflags='-w -s' -o flexoeshoje-darwin cmd/root.go
