name: Prebuilt binaries

on:
  workflow_dispatch:

  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build for linux
        run: go build -ldflags='-w -s' -o flexoeshoje main.go

      - name: Build for windows
        run: GOOS=windows go build -ldflags='-w -s' -o flexoeshoje.exe main.go

      - name: Build for macos
        run: GOOS=darwin go build -ldflags='-w -s' -o flexoeshoje-darwin main.go

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title ${{ github.ref_name }} \
            --generate-notes \
            flexoeshoje flexoeshoje.exe flexoeshoje-darwin
